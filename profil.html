<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="profil.js" defer></script>
    <script src="https://kit.fontawesome.com/51d2f8b0de.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title>Profil</title>
</head>

<body>
    <header>

    </header>

    <main>
        <section id="profil">
            <div class="container">
                <div class="row">
                    <div class="col-md-12">
                        <div class="box text-center">
                            <div class="textbox">
                                <h1>AstroPing</h1>
                                <button id="themeToggle">🌙</button>
                            </div>
                            <h2 id="welcomeUser"></h2>
                            <div class="add">
                                <input type="text" id="usernameSearch" placeholder="Axtarın...">
                                <button id="searchBtn">🔍</button>
                            </div>
                            <div id="recentChats">
                                <!-- Recent chats burada JS ilə yüklənəcək -->
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12 d-flex">
                        <div class="btnbox">
                            <div class="btn">
                                <h3>ÇIXIŞ</h3>
                            </div>
                            <button class="settings-btn">⚙️</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <div id="deleteModal" class="modal">
            <div class="modal-box">
                <h3>Profili silmək istədiyinizə əminsiniz?</h3>
                <div class="actions">
                    <button id="confirmDelete">bəli</button>
                    <button id="cancelDelete">xeyr</button>
                </div>
            </div>
        </div>
        <div id="pictureModal" class="modal">
            <div class="modal-box">
                <button id="cancel">❌</button>
                <div class="imgbox">
                    <img src="" alt="">
                </div>
            </div>
        </div>
    </main>

    <footer>

    </footer>
</body>

</html>
