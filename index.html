<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js" defer></script>
    <script src="login.js" defer></script>
    <script src="translate.js" defer></script>
    <script src="https://kit.fontawesome.com/51d2f8b0de.js" crossorigin="anonymous"></script>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Dosis:wght@500&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons/css/flag-icons.min.css">
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
    <title data-key="login">Login</title>
</head>

<body>
    <header>

    </header>

    <main>
        <section id="login">
            <div class="container">
                <div class="row">
                    <div class="col-md-12 d-flex justify-content-center">
                        <div class="box">
                            <div class="textbox">
                                <button id="themeToggle">🌙</button>
                                <div class="lang-selector">
                                    <button id="lang">🌐</button>
                                    <ul id="lang-menu" class="hidden">
                                        <li data-lang="AZ"><span class="fi fi-az"></span></li>
                                        <li data-lang="TR"><span class="fi fi-tr"></span></li>
                                        <li data-lang="RU"><span class="fi fi-ru"></span></li>
                                        <li data-lang="EN"><span class="fi fi-gb"></span></li>
                                    </ul>
                                </div>
                            </div>
                            <h1>AstroPing</h1>
                            <div class="add">
                                <input type="text" id="username" placeholder="Username" data-key="username">
                                <div class="password-box" style="position: relative;">
                                    <input type="password" id="password" placeholder="Password" data-key="password">
                                    <i class="fa-solid fa-eye-slash" id="toggle-password"
                                        style="color:#cdcaca; position: absolute; right: 30px; top: 50%; transform: translateY(-50%); cursor: pointer;"></i>
                                </div>
                            </div>
                            <div class="logbox">
                                <button id="login-btn" class="btn" data-key="login">
                                    <h3>Login</h3>
                                </button>
                            </div>

                            <p id="error-msg" style="color:red; font-weight:bold;"></p>
                            <!-- <div class="divider">
                                <span>OR</span>
                            </div> -->
                            <div class="forgot">
                                <a data-key="forgot_password" href="./forgot.html">Forgot password?</a>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-12 d-flex justify-content-center">
                        <div class="minibox d-flex justify-content-center">
                            <p data-key="no_account">Don't have an account?</p>
                            <a href="signup.html" data-key="signup">Sign up</a>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>

    </footer>
</body>

</html>
